name: 50-Bot Factory Auto-Engine

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  run-factory:
    runs-on: ubuntu-latest
    
    # Boss Move: API Keys ko poore job ke liye on kar diya, taaki har bot use kar sake
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      HUGGINGFACE_KEY: ${{ secrets.HUGGINGFACE_KEY }}

    steps:
    - name: 1. Checkout Repository
      uses: actions/checkout@v3

    - name: 2. Setup Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: 4. Install AI Libraries
      run: |
        python -m pip install --upgrade pip
        pip install google-generativeai requests gtts pillow

    - name: 5. Run Limitless Manager (Topic Selection)
      run: python manager.py

    - name: 6. Run Master Factory
      run: |
        # python master_factory.py (Typography lagne ke baad is line ka # hata denge)
        echo "Master Engine successfully activated with Limitless Topics!"
